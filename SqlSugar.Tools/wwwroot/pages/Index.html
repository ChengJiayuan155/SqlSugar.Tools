<!DOCTYPE html>
<html lang="en" xmlns="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>SqlSugar ORM Tools</title>
    <link href="../css/element-plus.css" rel="stylesheet" />
    <link href="../css/base.css" rel="stylesheet" />
    <link href="../css/index.css" rel="stylesheet" />
    <link href="../css/element-plus-app.css" rel="stylesheet" />
</head>
<body>
    <div id="app">
        <div id="tool">
            <el-tooltip class="item" effect="dark" content="退出程序" placement="right">
                <el-button onclick="exit()" style="top:10px" class="tool-btn tool-btn-icon" circle size="small">
                    <img src="../svg/close-btn.svg" width="14" height="14" alt="" />
                </el-button>
            </el-tooltip>
            <el-tooltip class="item" effect="dark" content="最大化" placement="right">
                <el-button n-ui-command="maximize" style="top:60px" class="tool-btn tool-btn-icon" circle size="small">
                    <img src="../svg/max-btn.svg" width="14" height="14" alt="" />
                </el-button>
            </el-tooltip>
            <el-tooltip class="item" effect="dark" content="最小化" placement="right">
                <el-button n-ui-command="minimize" style="top:110px" class="tool-btn tool-btn-icon" circle size="small">
                    <img src="../svg/min-btn.svg" width="14" height="14" alt="" />
                </el-button>
            </el-tooltip>
            <el-tooltip v-if="particlesJSSwitch === '1'" class="item" effect="dark" content="关闭背景特效, 减少CPU占用" placement="right">
                <el-button @click="closeParticles" style="top:160px" class="tool-btn tool-btn-icon" circle size="small">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="1.8" aria-hidden="true"><rect x="3" y="3" width="18" height="18" rx="2" /><circle cx="8.5" cy="8.5" r="1.5" fill="currentColor" stroke="none" /><path d="M21 15l-5-5L5 21" stroke-linecap="round" /></svg>
                </el-button>
            </el-tooltip>
            <el-tooltip v-else class="item" effect="dark" content="打开背景特效, 会占用3%左右的CPU" placement="right">
                <el-button @click="openParticles" style="top:160px" class="tool-btn tool-btn-icon" circle size="small">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="14" height="14" fill="currentColor" aria-hidden="true"><path d="M21 19V5c0-1.1-.9-2-2-2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2zM8.5 13.5l2.5 3.01L14.5 12l4.5 6H5l3.5-4.5z" /></svg>
                </el-button>
            </el-tooltip>
        </div>
        <div id="td" style="top:195px;"></div>
        <h1 style="text-align:center;color:#444;font-family:微软雅黑">SQL Sugar ORM 工具箱</h1>
        <el-row :gutter="20" class="panel-group">
            <el-col :xs="12" :sm="12" :lg="6" class="card-panel-col" onclick="toWord()">
                <div class="card-panel">
                    <div class="card-panel-icon-wrapper icon-people">
                        <svg class="" style="width:35px;height:35px;">
                            <image xlink:href="../svg/word.svg" width="35px" height="35px"></image>
                        </svg>
                    </div>
                    <div class="card-panel-description">
                        <div class="card-panel-text">SQL Sugar ORM开发文档</div>
                        <span>果糖网 SqlSugar 官方文档（donet5.com）</span>
                    </div>
                </div>
            </el-col>
            <el-col :xs="12" :sm="12" :lg="6" class="card-panel-col" onclick="openGuide()">
                <div class="card-panel">
                    <div class="card-panel-icon-wrapper icon-people">
                        <svg class="" style="width:35px;height:35px;">
                            <image xlink:href="../svg/settings.svg" width="35px" height="35px"></image>
                        </svg>
                    </div>
                    <div class="card-panel-description">
                        <div class="card-panel-text">使用教程 / 分层生成</div>
                        <span>命名规范、枚举/导航、分层(MVC)原理</span>
                    </div>
                </div>
            </el-col>
            <el-col :xs="12" :sm="12" :lg="6" class="card-panel-col" onclick="showCreateEntity()">
                <div class="card-panel">
                    <div class="card-panel-icon-wrapper icon-people">
                        <svg class="" style="width:35px;height:35px;">
                            <image xlink:href="../svg/entity.svg" width="35px" height="35px"></image>
                        </svg>
                    </div>
                    <div class="card-panel-description">
                        <div class="card-panel-text">代码生成</div>
                        <span>实体 / 模板 / 分层（增强中）</span>
                    </div>
                </div>
            </el-col>
            <el-col :xs="12" :sm="12" :lg="6" class="card-panel-col" onclick="showDBMove()">
                <div class="card-panel">
                    <div class="card-panel-icon-wrapper icon-people">
                        <svg class="" style="width:35px;height:35px;">
                            <image xlink:href="../svg/settings.svg" width="35px" height="35px"></image>
                        </svg>
                    </div>
                    <div class="card-panel-description">
                        <div class="card-panel-text">数据库迁移</div>
                        <span>从一个数据库迁移到另一个数据库</span>
                    </div>
                </div>
            </el-col>
            <el-col :xs="12" :sm="12" :lg="6" class="card-panel-col" onclick="toHome()">
                <div class="card-panel">
                    <div class="card-panel-icon-wrapper icon-people">
                        <svg class="" style="width:35px;height:35px;">
                            <image xlink:href="../svg/homeweb.svg" width="35px" height="35px"></image>
                        </svg>
                    </div>
                    <div class="card-panel-description">
                        <div class="card-panel-text">浏览官网</div>
                        <span>SQL Sugar ORM</span>
                    </div>
                </div>
            </el-col>
            <!--
            <el-col :xs="12" :sm="12" :lg="6" class="card-panel-col" onclick="toGithub()">
                <div class="card-panel">
                    <div class="card-panel-icon-wrapper icon-people">
                        <svg class="" style="width:35px;height:35px;">
                            <image xlink:href="../svg/github.svg" width="35px" height="35px"></image>
                        </svg>
                    </div>
                    <div class="card-panel-description">
                        <div class="card-panel-text">Github给个Star</div>
                        <span>SQL Sugar ORM</span>
                    </div>
                </div>
            </el-col>
            <el-col :xs="12" :sm="12" :lg="6" class="card-panel-col" onclick="showPay()">
                <div class="card-panel">
                    <div class="card-panel-icon-wrapper icon-people">
                        <svg class="" style="width:35px;height:35px;">
                            <image xlink:href="../svg/aboutus.svg" width="35px" height="35px"></image>
                        </svg>
                    </div>
                    <div class="card-panel-description">
                        <div class="card-panel-text">捐赠/关于</div>
                        <span>如果该工具为你提供了便利, 可以适当给予捐赠</span>
                    </div>
                </div>
            </el-col>
            -->
        </el-row>
        <div id="particles-js"></div>
    </div>
</body>
</html>
<script src="../js/particles.js"></script>
<script src="../js/vue3.global.prod.js"></script>
<script src="../js/element-plus.full.min.js"></script>
<script src="../js/index.js"></script>
